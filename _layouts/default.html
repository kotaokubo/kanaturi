<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% seo %}

  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/css/style.css?v=8' | relative_url }}">

  {%- assign org = site.organization -%}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "{{ org.name }}",
    "legalName": "{{ org.legal_name }}",
    "url": "{{ site.url }}",
    "logo": "{{ '/images/hero.webp' | absolute_url }}",
    "telephone": "{{ org.telephone }}",
    "faxNumber": "{{ org.fax }}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ org.address.street }}",
      "addressLocality": "{{ org.address.locality }}",
      "addressRegion": "{{ org.address.region }}",
      "postalCode": "{{ org.address.postal_code }}",
      "addressCountry": "{{ org.address.country }}"
    },
    "areaServed": "神奈川県",
    "description": "{{ site.description }}"
  }
  </script>

  {% if site.google_analytics and jekyll.environment == "production" %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}
</head>
<body>

  {% include header.html %}

  <main>
  {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
