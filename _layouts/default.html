<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="{{ page.og_type | default: 'website' }}">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:image" content="{{ '/images/hero.webp' | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ '/images/hero.webp' | absolute_url }}">
  <title>{{ page.title }}</title>
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/css/style.css?v=8' | relative_url }}">
</head>
<body>

  {% include header.html %}

  <main>
  {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
